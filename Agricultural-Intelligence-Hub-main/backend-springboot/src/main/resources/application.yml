server:
  port: ${PORT:8080}
  api:
    base-path: /api

app:
  client-api-key: ${CLIENT_API_KEY:agri_hub_desktop_client_secret_2026}
  api:
    base-path: /api
  weather:
    api-key: ${WEATHER_API_KEY:demo_key}
    base-url: http://api.openweathermap.org/data/2.5
  ai:
    gemini-api-key: ${GEMINI_API_KEY:demo_key}

spring:
  config:
    import: optional:file:./secrets.properties
  datasource:
    url: jdbc:h2:file:./backend_db;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ${DB_PASSWORD:agri_hub_db_pass}
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    database-platform: org.hibernate.dialect.H2Dialect
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  # Email Configuration
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME:demo@example.com}
    password: ${EMAIL_PASSWORD:demo_password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

